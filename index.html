<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ★ [수정] 제목 반영 -->
    <title>이론가 카드 매칭</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background-color: #f0f4f8;
            color: #1a202c;
            margin: 0;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        h1 {
            color: #2d3748;
            font-size: 1.6rem;
            margin: 5px 0;
            font-weight: 800;
            text-align: center;
        }

        .subtitle {
            color: #4a5568;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
        }

        .status-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: 800;
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
        }

        .game-board {
            display: flex;
            flex-direction: column; /* 모바일 우선: 세로 배치 */
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 15px;
            box-sizing: border-box;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 데스크톱이나 패드 화면에서는 가로 2열 배치로 자동 전환 */
        @media (min-width: 768px) {
            .game-board {
                flex-direction: row;
                max-width: 1000px;
            }
            .board-column { width: 49%; }
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .status-container { font-size: 1.3rem; }
        }

        .board-column {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .column-title {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: #4c51bf;
            padding-bottom: 6px;
            border-bottom: 3px solid #e2e8f0;
            width: 100%;
            text-align: center;
        }

        .right-col .column-title {
            color: #2c5282;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr; /* 모바일 가독성을 위해 한 열에 하나씩 배치 */
            gap: 12px;
            width: 100%;
            box-sizing: border-box;
        }

        /* 터치 씹힘과 텍스트 이탈을 원천 차단하는 2D 카드 구조 */
        .card {
            min-height: 70px;
            cursor: pointer;
            position: relative;
            border-radius: 10px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            touch-action: manipulation; /* 모바일 터치 반응 속도 최적화 */
            border: 2.5px solid transparent;
        }

        /* 카드 미뒤집힘 상태 (앞면 스타일) */
        .card.cover-style {
            background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%);
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 800;
            border-color: #cbd5e1;
        }

        .left-col .card.cover-style { background: linear-gradient(135deg, #667eea 0%, #5a67d8 100%); }
        .right-col .card.cover-style { background: linear-gradient(135deg, #4299e1 0%, #2b6cb0 100%); }

        /* 뒤집혔을 때 텍스트 크기 자동 조절 및 줄바꿈 최적화 */
        .card.flipped {
            background-color: #ffffff;
            color: #1a202c;
            transform: none;
        }

        .left-col .card.flipped {
            font-size: 1.05rem;
            font-weight: 800;
            color: #2b36c1;
            background-color: #ebf8ff;
            border-color: #5a67d8;
        }

        .right-col .card.flipped {
            font-size: 0.88rem;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            border-color: #2b6cb0;
            word-break: keep-all;
        }

        .card.matched {
            background-color: #edf2f7 !important;
            color: #a0aec0 !important;
            border: 2px dashed #cbd5e1 !important;
            box-shadow: none;
            pointer-events: none;
            opacity: 0.5;
        }

        .card.wrong-flash {
            box-shadow: 0 0 12px #f56565 !important;
            border-color: #f56565 !important;
        }

        .btn-reset {
            background: linear-gradient(135deg, #48bb78, #2f855a);
            color: white;
            font-size: 1.1rem;
            font-weight: 900;
            border: none;
            padding: 12px 35px;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(72, 187, 120, 0.3);
            touch-action: manipulation;
        }

        #success-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>

    <canvas id="success-canvas"></canvas>

    <!-- ★ [수정] 메인 제목 변경 -->
    <h1>🧩 이론가 카드 매칭</h1>
    <div class="subtitle">왼쪽의 [학자 이름] 카드와 오른쪽의 [이론 설명] 카드를 터치하여 짝을 맞추세요! (틀릴 경우 5초간 유지됩니다.)</div>

    <div class="status-container">
        <div>⏱️ 시간: <span id="timer">00:00</span></div>
        <div>🎯 성공: <span id="match-count">0</span> / 7 쌍</div>
    </div>

    <div class="game-board">
        <div class="board-column left-col">
            <div class="column-title">👴 마스터 이론가 (이름)</div>
            <div class="grid-layout" id="left-grid"></div>
        </div>
        
        <div class="board-column right-col">
            <div class="column-title">📖 교육학 핵심 이론 (설명)</div>
            <div class="grid-layout" id="right-grid"></div>
        </div>
    </div>

    <button class="btn-reset" onclick="initGame()">🔄 게임 다시 시작하기</button>

    <script>
        // ★ [복원] 에리카 선생님이 작성해 주신 원본 데이터셋 그대로 100% 매칭 수록
        const rawData = [
            { name: "위긴스 & 멕타이", desc: "핵심 질문, 영속적 이해, 교육과정의 Alignment, 활동 중심의 오류, 이해의 6가지 측면" },
            { name: "존 듀이", desc: "Learning by Doing, 반성적 사고" },
            { name: "에릭슨 & 래닝", desc: "3차원적 교육과정 모델, 개념적 렌즈, 지식의 구조" },
            { name: "마샬 & 프렌치", desc: "관계맺기 - 집중하기 - 조사하기 - 정리하기 - 개념화하기 - 전이하기 - 성찰하기" },
            { name: "수잔 브룩하트", desc: "루브릭은 실패기록표가 아닌 성장지도다. 성취 수준 진술문은 학생이 무엇을 할 수 있는지를 묘사하라! 못한다는 말 대신 어떻게 성장해야 하는지 정보를 주어라!" },
            { name: "노만 웹", desc: "Depth-of-Knowledge Levels, 평가 문항이나 수업 활동이 학생에게 얼마나 깊은 고차원적 사고를 요구하는가" },
            { name: "비고츠키", desc: "근접발달영역 ZPD(Zone of Proximal Development), 장학 처방은 교사의 현재 역량보다 약간 높은 ZPD를 저격하여 정교하게 비계를 제공할 때 가장 효과적" }
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let timerInterval = null;
        let timeElapsed = 0;
        let gameActive = false;

        const canvas = document.getElementById('success-canvas');
        const ctx = canvas.getContext('2d');
        let confetti = [];
        let animationId = null;

        window.onload = function() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            initGame();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initGame() {
            clearInterval(timerInterval);
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confetti = [];
            
            document.getElementById('left-grid').innerHTML = '';
            document.getElementById('right-grid').innerHTML = '';
            flippedCards = [];
            matchedCount = 0;
            timeElapsed = 0;
            gameActive = false;
            document.getElementById('timer').innerText = '00:00';
            document.getElementById('match-count').innerText = '0';

            let leftDeck = [];
            let rightDeck = [];

            rawData.forEach((item, index) => {
                leftDeck.push({ id: index, type: 'name', text: item.name });
                rightDeck.push({ id: index, type: 'desc', text: item.desc });
            });

            leftDeck.sort(() => Math.random() - 0.5);
            rightDeck.sort(() => Math.random() - 0.5);

            renderDeck(leftDeck, 'left-grid');
            renderDeck(rightDeck, 'right-grid');
        }

        function renderDeck(deck, gridId) {
            const grid = document.getElementById(gridId);
            deck.forEach((cardData) => {
                const card = document.createElement('div');
                card.classList.add('card', 'cover-style');
                card.dataset.id = cardData.id;
                card.dataset.type = cardData.type;
                card.dataset.rawtext = cardData.text;
                card.innerText = "❓";

                card.addEventListener('click', flipCard);
                grid.appendChild(card);
            });
        }

        function startTimer() {
            gameActive = true;
            timerInterval = setInterval(() => {
                timeElapsed++;
                const mins = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
                const secs = String(timeElapsed % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function flipCard() {
            if (!gameActive && matchedCount === 0 && flippedCards.length === 0) {
                startTimer();
            }

            const clickedCard = this;

            if (clickedCard.classList.contains('flipped') || clickedCard.classList.contains('matched') || flippedCards.length >= 2) {
                return;
            }

            if (flippedCards.length === 1 && flippedCards[0].dataset.type === clickedCard.dataset.type) {
                return;
            }

            clickedCard.classList.remove('cover-style');
            clickedCard.classList.add('flipped');
            clickedCard.innerHTML = clickedCard.dataset.rawtext;
            flippedCards.push(clickedCard);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const card1 = flippedCards[0];
            const card2 = flippedCards[1];

            if (card1.dataset.id === card2.dataset.id) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount++;
                document.getElementById('match-count').innerText = matchedCount;
                flippedCards = [];

                if (matchedCount === rawData.length) {
                    endGame();
                }
            } else {
                card1.classList.add('wrong-flash');
                card2.classList.add('wrong-flash');

                setTimeout(() => {
                    card1.classList.remove('flipped', 'wrong-flash');
                    card2.classList.remove('flipped', 'wrong-flash');
                    card1.classList.add('cover-style');
                    card2.classList.add('cover-style');
                    card1.innerText = "❓";
                    card2.innerText = "❓";
                    flippedCards = [];
                }, 5000);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            gameActive = false;
            initConfetti();
            animateConfetti();

            setTimeout(() => {
                alert(`🎉 퍼펙트! 에리카 선생님!\n7인의 마스터 이론가 요약 카드를 완벽히 마스터하셨습니다.\n⏱️ 소요 시간: ${document.getElementById('timer').innerText}`);
            }, 400);
        }

        function initConfetti() {
            confetti = [];
            const colors = ['#667eea', '#764ba2', '#48bb78', '#38a169', '#ed64a6', '#ecc94b', '#4299e1'];
            for (let i = 0; i < 150; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let remaining = false;

            for (let i = 0; i < confetti.length; i++) {
                let p = confetti[i];
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - i / 5) * 15;

                if (p.y <= canvas.height) {
                    remaining = true;
                }

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                ctx.stroke();
            }

            if (remaining) {
                animationId = requestAnimationFrame(animateConfetti);
            }
        }
    </script>
</body>
</html>
